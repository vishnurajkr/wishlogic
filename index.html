<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WishLogic</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Inter',sans-serif;
  background:#020617;
  color:white;
  overflow-x:hidden;
}

/* Background glow */
body::before, body::after{
  content:'';
  position:fixed;
  width:600px;height:600px;
  filter:blur(120px);
  z-index:-1;
}
body::before{
  background:#6366f1;
  top:-200px;left:-200px;
}
body::after{
  background:#22d3ee;
  bottom:-200px;right:-200px;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:80px 20px;
  text-align:center;
}

/* HERO */
h1{
  font-size:60px;
  background:linear-gradient(135deg,#6366f1,#22d3ee);
  -webkit-background-clip:text;
  color:transparent;
}

.tagline{
  margin-top:15px;
  color:#94a3b8;
  font-size:20px;
}

/* Glass */
.glass{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(14px);
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.08);
}

/* Sections */
.section{margin-top:120px;}

.btn{
  display:inline-block;
  margin-top:20px;
  padding:12px 24px;
  border-radius:10px;
  background:linear-gradient(135deg,#6366f1,#22d3ee);
  color:white;
  text-decoration:none;
  font-weight:600;
}

/* PRODUCT CARD */
.product{
  margin-top:40px;
  padding:40px;
}

.features{
  margin-top:30px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
}

.feature{
  padding:20px;
}

/* FUTURE */
.products{
  margin-top:40px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

footer{
  margin-top:120px;
  color:#64748b;
}
</style>

</head>

<body>

<div class="container">

<!-- BRAND -->

<h1>WishLogic</h1>
<p class="tagline">Building modern financial tools & experiences</p>

<!-- FEATURED PRODUCT -->

<div class="section">
  <h2>Featured Product</h2>

  <div class="glass product">
    <h3 style="font-size:28px;">Fynixo</h3>
    <p style="margin-top:10px;color:#94a3b8;">
      Smart personal finance tracking app with real-time insights.
    </p>

target="_blank">

</a>

<div class="features">
  <div class="glass feature">📊 Analytics</div>
  <div class="glass feature">💸 Tracking</div>
  <div class="glass feature">🎯 Budgets</div>
  <div class="glass feature">🔐 Offline</div>
</div>

  </div>
</div>

<!-- FUTURE PRODUCTS -->

<div class="section">
  <h2>More Coming Soon</h2>

  <div class="products">
    <div class="glass feature">🚀 New App</div>
    <div class="glass feature">🧠 AI Tools</div>
  </div>
</div>

<footer>
© 2026 WishLogic
</footer>

</div>

</body>
</html>
