.container {
  max-width: 1100px;
  margin: auto;
  padding: 40px 20px;
  text-align: center;
}

h1 {
  font-size: 48px;
  margin-bottom: 10px;
}

p {
  color: #94a3b8;
  font-size: 18px;
}

.btn {
  display: inline-block;
  margin-top: 20px;
  padding: 12px 24px;
  background: linear-gradient(135deg, #6366f1, #22d3ee);
  border-radius: 8px;
  text-decoration: none;
  color: white;
  font-weight: 600;
}

.section {
  margin-top: 80px;
}

.features {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  margin-top: 40px;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 12px;
  backdrop-filter: blur(10px);
}

footer {
  margin-top: 100px;
  font-size: 14px;
  color: #64748b;
}
