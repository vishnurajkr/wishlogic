<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fynixo</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Inter',sans-serif;
  background:#020617;
  color:white;
  overflow-x:hidden;
}

/* Gradient blobs */
body::before, body::after{
  content:'';
  position:fixed;
  width:600px;height:600px;
  filter:blur(120px);
  z-index:-1;
}
body::before{
  background:#6366f1;
  top:-200px;left:-200px;
}
body::after{
  background:#22d3ee;
  bottom:-200px;right:-200px;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:80px 20px;
  text-align:center;
}

h1{
  font-size:64px;
  background:linear-gradient(135deg,#6366f1,#22d3ee);
  -webkit-background-clip:text;
  color:transparent;
}

.tagline{
  margin-top:15px;
  color:#94a3b8;
  font-size:20px;
}

.btn{
  display:inline-block;
  margin-top:30px;
  padding:14px 30px;
  border-radius:12px;
  background:linear-gradient(135deg,#6366f1,#22d3ee);
  color:white;
  text-decoration:none;
  font-weight:600;
  transition:0.3s;
}

.btn:hover{transform:scale(1.05);}

.section{margin-top:120px;}

.glass{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(14px);
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.08);
}

.features{
  margin-top:50px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:25px;
}

.feature{
  padding:30px;
  transition:0.3s;
}

.feature:hover{
  transform:translateY(-10px);
}

.screens{
  margin-top:60px;
  display:flex;
  gap:25px;
  overflow-x:auto;
}

.screen{
  min-width:260px;
  height:520px;
  border-radius:25px;
  background:rgba(255,255,255,0.06);
}

footer{
  margin-top:140px;
  color:#64748b;
}
</style>

</head>

<body>

<div class="container">

<h1>Fynixo</h1>
<p class="tagline">Track money smarter. Build better financial habits.</p>

<!-- 🔥 APK DOWNLOAD BUTTON -->

<a class="btn" 
href="https://github.com/vishnurajkr/wishlogic/releases/download/v1.0.0/app-release.apk" 
target="_blank">
📥 Download APK </a>

<p style="margin-top:10px;color:#64748b;">
v1.0 • Secure download
</p>

<div class="section">
  <h2>Features</h2>

  <div class="features">
    <div class="glass feature">📊 Smart Analytics</div>
    <div class="glass feature">💸 Real-time Tracking</div>
    <div class="glass feature">🎯 Budget Control</div>
    <div class="glass feature">🔐 Offline & Secure</div>
  </div>
</div>

<div class="section">
  <h2>App Preview</h2>

  <div class="screens">
    <div class="screen"></div>
    <div class="screen"></div>
    <div class="screen"></div>
  </div>
</div>

<footer>
Built by WishLogic • 2026
</footer>

</div>

</body>
</html>
